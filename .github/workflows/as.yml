name: as

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Lab examples with MASM6.x
      shell: pwsh
      run: |
        $OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

        $projectRoot = $PWD.Path
        $masmDir = Join-Path $projectRoot "masm"

        if (-not (Test-Path $masmDir)) {
            Write-Host "Error: masm folder not found at $masmDir"
            exit 1
        }

        $env:Path = "$masmDir;$env:Path"

        $asmFiles = Get-ChildItem -Recurse -Include "*.asm" | Where-Object {
            $_.Name -match "^lab\d" -or $_.Name -match "^chk\d" -or $_.Name -match "^proj\d" 
        }

        $success = 0
        $failed = 0

        foreach ($asm in $asmFiles) {
            $filename = $asm.BaseName
            $dir = $asm.DirectoryName
            $objPath = Join-Path $dir "$filename.obj"
            $exePath = Join-Path $dir "$filename.exe"

            Write-Host "Assembling: $($asm.Name)"

            $mlCmd = Start-Process -FilePath "$masmDir\ML.EXE" -ArgumentList "/c","$($asm.FullName)" -NoNewWindow -Wait -PassThru -WorkingDirectory $dir
            if ($mlCmd.ExitCode -eq 0 -or (Test-Path $objPath)) {
                Write-Host "  -> Assembled: $filename.obj"

                Write-Host "  -> Linking: $filename.exe"
                if (Test-Path $objPath) {
                    $linkCmd = Start-Process -FilePath "$masmDir\LINK.EXE" -ArgumentList "$objPath" -NoNewWindow -Wait -PassThru -WorkingDirectory $dir
                    if ($linkCmd.ExitCode -eq 0 -or (Test-Path $exePath)) {
                        Write-Host "  -> Linked: $filename.exe"
                        $success++
                    } else {
                        Write-Host "  -> Link failed (exit code: $($linkCmd.ExitCode))"
                        $failed++
                    }
                } else {
                    Write-Host "  -> OBJ file not found"
                    $failed++
                }
            } else {
                Write-Host "  -> Assembly failed (exit code: $($mlCmd.ExitCode))"
                $failed++
            }
        }

        Write-Host ""
        Write-Host "Build summary: $success succeeded, $failed failed"

    - name: List compiled files
      run: |
        Get-ChildItem -Recurse -Include "*.exe","*.obj" | Select-Object FullName, Length
